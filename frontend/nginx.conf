server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls and SSE streams to the backend.
    # resolver + variable defers DNS lookup to request time so nginx starts
    # successfully even if the backend container isn't up yet.
    location /api/ {
        resolver           127.0.0.11 valid=5s ipv6=off;
        set $backend       http://backend:3000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Required for SSE: disable buffering so log lines flush immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — send all non-asset routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
