services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brimble-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/brimble.db
      - LOGS_DIR=/app/data/logs
      - CADDY_ADMIN_URL=http://caddy:2019
      - CONTAINER_PORT_START=4000
      - DEPLOY_HOST=localhost:8080
      - BUILDKIT_HOST=docker-container://buildkit
    depends_on:
      - caddy
      - buildkit
    networks:
      - brimble

  buildkit:
    image: moby/buildkit
    container_name: buildkit
    restart: unless-stopped
    privileged: true
    volumes:
      - buildkit_cache:/var/lib/buildkit
    networks:
      - brimble

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brimble-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - brimble

  caddy:
    image: caddy:2-alpine
    container_name: brimble-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Needed on Linux so host.docker.internal resolves to the Docker bridge
    # gateway — lets Caddy reach deployed containers on host ports 4000+.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - brimble

volumes:
  caddy_data:
  caddy_config:
  buildkit_cache:

networks:
  brimble:
    driver: bridge
